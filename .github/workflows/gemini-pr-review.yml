name: Gemini AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -U google-generativeai

      - name: Extract Diff
        id: extract_diff
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            git diff origin/${{ github.base_ref }}...HEAD > changes.diff
          else
            git diff HEAD^ HEAD > changes.diff
          fi
          
          if [ -s changes.diff ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Review with Gemini
        if: steps.extract_diff.outputs.has_changes == 'true'
        id: gemini_review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: python
        run: |
          import os
          import google.generativeai as genai

          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              with open('review_result.md', 'w') as f:
                  f.write("⚠️ GEMINI_API_KEY가 설정되지 않았습니다.")
              exit(0)

          genai.configure(api_key=api_key)

          # 사용 가능한 모델 목록 출력 (디버깅용)
          print("--- Available Models ---")
          available_models = []
          try:
              for m in genai.list_models():
                  if 'generateContent' in m.supported_generation_methods:
                      print(f"- {m.name}")
                      available_models.append(m.name)
          except Exception as e:
              print(f"Error listing models: {e}")

          # 최적의 모델 선택 (1.5-flash -> 1.5-pro -> 1.0-pro 순)
          model_name = "gemini-1.5-flash" # Default
          for target in ["models/gemini-1.5-flash", "models/gemini-1.5-pro", "models/gemini-1.0-pro"]:
              if target in available_models:
                  model_name = target.replace("models/", "")
                  break
          
          print(f"Selected Model: {model_name}")
          model = genai.GenerativeModel(model_name)

          with open('changes.diff', 'r') as f:
              diff_content = f.read()

          if len(diff_content) > 30000:
              diff_content = diff_content[:30000] + "\n\n... (너무 길어서 생략됨)"

          prompt = f"""
          당신은 WorkPresso 프로젝트의 시니어 풀스택 개발자입니다. 
          제시된 코드 변경사항(diff)을 리뷰하고 개선안을 한국어로 제안해주세요.

          **리뷰 원칙:**
          1. 친절하고 격려하는 말투를 사용하세요.
          2. **로직 정확성 검증**: 구현된 로직이 의도한 대로 동작하는지, 예외 상황에 대한 처리가 누락되지 않았는지 확인하세요.
          3. **버그 및 취약점 탐지**: 잠재적인 버그나 보안 취약점이 있다면 구체적인 코드 예시와 함께 지적해주세요.
          4. 데이터베이스 스키마와의 일관성, Tailwind 디자인 시스템 준수 여부를 중점적으로 보세요.
          5. 성능 개선이 가능하다면 최적화 방안을 제안하세요.

          **변경 사항 (Git Diff):**
          {diff_content}
          """

          try:
              response = model.generate_content(prompt)
              review_text = response.text
          except Exception as e:
              review_text = f"리뷰 생성 중 오류가 발생했습니다: {str(e)}\n사용 시도 모델: {model_name}"
          
          with open('review_result.md', 'w') as f:
              f.write("### 🤖 Gemini AI Code Review\n\n")
              f.write(review_text)

      - name: Post Comment to PR
        if: github.event_name == 'pull_request' && steps.extract_diff.outputs.has_changes == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: 'review_result.md'

      - name: Output Review for Push (Logging)
        if: github.event_name == 'push' && steps.extract_diff.outputs.has_changes == 'true'
        run: |
          cat review_result.md
          echo "::notice ::Push 이벤트 리뷰가 완료되었습니다. 상세 내용은 로그를 확인하세요."
